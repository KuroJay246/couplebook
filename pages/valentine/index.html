<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Be My Valentine 💘</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(-45deg, #fb7185, #ec4899, #db2777, #f9a8d4);
      background-size: 400% 400%;
      animation: bgMove 12s ease infinite;
      font-family: "Poppins", sans-serif;
      overflow: hidden;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Card */
    .card {
      width: min(92%, 420px);
      padding: 40px 30px 45px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(18px);
      border-radius: 28px;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,0.25), inset 0 0 0 1px rgba(255,255,255,0.4);
      position: relative;
      animation: cardIn 1.1s ease;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 30px;
      background: linear-gradient(120deg, #ff4d6d, #ff9a9e, #fbc2eb);
      z-index: -1;
      filter: blur(20px);
      opacity: 0.7;
    }

    .emoji { font-size: 68px; margin-bottom: 12px; animation: heartbeat 1.8s infinite; }

    @keyframes heartbeat {
      0%,100% { transform: scale(1); }
      25% { transform: scale(1.08); }
      50% { transform: scale(1); }
      75% { transform: scale(1.12); }
    }

    h2 {
      font-family: "Playfair Display", serif;
      font-size: 28px;
      color: #4a1c2f;
      margin-bottom: 30px;
      line-height: 1.35;
    }

    .buttons { position: relative; height: 78px; }

    button {
      position: absolute;
      padding: 14px 36px;
      border-radius: 40px;
      border: none;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    button:active { transform: scale(0.94); }

    #yes {
      left: 12%;
      background: linear-gradient(135deg, #ff4d6d, #ff758f);
      color: #fff;
      box-shadow: 0 15px 35px rgba(255,77,109,0.55);
    }
    #yes:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 40px rgba(255,77,109,0.7);
    }

    #no {
      left: 55%;
      background: rgba(255,255,255,0.9);
      color: #777;
    }

    .hint { margin-top: 28px; font-size: 13px; color: #6b6b6b; font-style: italic; }

    /* Floating hearts */
    .heart {
      position: absolute;
      bottom: -20px;
      animation: floatUp linear forwards;
      pointer-events: none;
      filter: blur(0.3px);
      font-size: 20px;
      color: #ff6f91;
    }

    @keyframes floatUp {
      from { transform: translateY(0) scale(1); opacity: 1; }
      to { transform: translateY(-120vh) scale(1.5); opacity: 0; }
    }

    /* Responsive */
    @media (max-width: 480px) {
      h2 { font-size: 23px; }
      .emoji { font-size: 58px; }
      button { padding: 12px 28px; font-size: 15px; }
      #yes { left: 8%; }
      #no { left: 55%; }
    }

    /* Flirty messages popups */
    .popup-msg {
      position: absolute;
      font-size: 16px;
      font-weight: bold;
      color: #ff3366;
      animation: popupAnim 2.2s ease forwards;
      pointer-events: none;
      text-shadow: 1px 1px 2px #fff;
    }

    @keyframes popupAnim {
      0% { opacity: 0; transform: translateY(0) scale(0.8); }
      20% { opacity: 1; transform: translateY(-20px) scale(1.1); }
      80% { opacity: 1; transform: translateY(-40px) scale(1); }
      100% { opacity: 0; transform: translateY(-60px) scale(0.9); }
    }

  </style>
</head>
<body>

  <div class="card">
    <div class="emoji">🌸💜</div>
    <h2>Omia,<br>Will you be my Valentine?</h2>

    <div class="buttons">
      <button id="yes">Yes 💖</button>
      <button id="no">No 🙈</button>
    </div>

    <div class="hint">No is not an option ml ✨</div>
  </div>

  <script>
    const noBtn = document.getElementById("no");
    const yesBtn = document.getElementById("yes");
    const card = document.querySelector(".card");

    // Sounds (optional)
    const hoverSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-cartoon-voice-laugh-343.mp3");
    const yesSound = new Audio("Alkaline-High-Props-Prod.-By-ArmzHouse-Records.mp3");

    // Sneaky messages array
    const flirtyMessages = [
      "Gyal, yuh jus ah drive me crazy 💖",
      "Mi wah tek yuh pon a ride like di rodeo 🎠",
      "One piece ah hotness, and yuh heart cold… guess wah my heart colda 💘",
      "Hottie, like a work a art 🌸",
      "Wine yuh waistline, mi ah pree every move 😉",
      "Some odda gyal need fi practice, but yuh natural 😏",
      "Mi gi yuh high props, always 💕",
      "Move like a goddess, mi follow every step 👑"
    ];

    // No button teasing her
    noBtn.addEventListener("mouseenter", () => {
      hoverSound.currentTime = 0;
      hoverSound.play();

      const cardRect = card.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();

      const maxX = cardRect.width - btnRect.width - 10;
      const maxY = cardRect.height - btnRect.height - 10;

      noBtn.style.left = Math.random() * maxX + "px";
      noBtn.style.top = Math.random() * maxY + "px";

      showFlirtyMessage("Gyal, yuh jus ah drive me crazy 💖");
    });

    // Yes button clicked
    yesBtn.addEventListener("click", () => {
      yesSound.play();

      // Confetti
      confetti({
        particleCount: 260,
        spread: 120,
        origin: { y: 0.65 }
      });

      // Random flirty message
      const msg = flirtyMessages[Math.floor(Math.random()*flirtyMessages.length)];
      showFlirtyMessage(msg);

      setTimeout(() => {
        alert("As you should ml oh i mean... YAY 💕 I can’t wait for Valentine’s Day with you!");
      }, 500);
    });

    // Function to show a popup message
    function showFlirtyMessage(text) {
      const popup = document.createElement("div");
      popup.className = "popup-msg";
      popup.textContent = text;
      popup.style.left = Math.random() * 70 + "vw";
      popup.style.top = Math.random() * 50 + "vh";
      document.body.appendChild(popup);
      setTimeout(() => popup.remove(), 2200);
    }

    // Floating hearts
    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "heart";
      if (Math.random() > 0.8) {
        heart.textContent = flirtyMessages[Math.floor(Math.random()*flirtyMessages.length)];
        heart.style.fontSize = Math.random() * 16 + 12 + "px";
        heart.style.color = "#ff3366";
        heart.style.fontWeight = "bold";
        heart.style.textShadow = "1px 1px 2px #fff";
      } else {
        heart.textContent = Math.random() > 0.5 ? "💜" : "🌸";
        heart.style.fontSize = Math.random() * 22 + 14 + "px";
        heart.style.color = "#ff6f91";
      }
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = Math.random() * 3 + 4 + "s";
      heart.style.opacity = Math.random() * 0.5 + 0.4;
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 8000);
    }

    setInterval(createHeart, 380);

  </script>
</body>
</html>
