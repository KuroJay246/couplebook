<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — MemoryBook</title>
  <meta name="description" content="Sign in to your private MemoryBook vault.">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .auth-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      padding: 2.5rem;
      text-align: center;
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      text-align: left;
      margin-top: 1.5rem;
    }
    .auth-tabs {
      display: flex;
      margin-bottom: 0;
      border-bottom: 1px solid var(--border-glass);
      margin-top: 2rem;
    }
    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 0.75rem;
      cursor: pointer;
      color: var(--color-muted);
      border-bottom: 2px solid transparent;
      transition: var(--transition-fast);
      font-size: 0.9rem;
      font-weight: 500;
    }
    .auth-tab.active {
      color: var(--color-jaylan);
      border-bottom-color: var(--color-jaylan);
    }
    .auth-error {
      font-size: 0.85rem;
      text-align: center;
      min-height: 1.2rem;
      padding: 0.25rem 0;
      color: #ff4a6b;
    }
    .registration-locked-msg {
      display: none;
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.3);
      font-size: 0.8rem;
      color: var(--color-omia);
      text-align: center;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 0.25rem;
      color: var(--color-muted);
      font-size: 0.8rem;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-glass);
    }
    .btn-guest {
      width: 100%;
      padding: 0.65rem;
      border-radius: 10px;
      background: transparent;
      border: 1px solid var(--border-glass);
      color: var(--color-muted);
      font-size: 0.85rem;
      cursor: pointer;
      transition: var(--transition-fast);
      margin-top: 0.25rem;
    }
    .btn-guest:hover {
      background: rgba(255,255,255,0.04);
      color: var(--color-secondary-text);
      border-color: rgba(255,255,255,0.15);
    }
  </style>
</head>
<body>
  <div id="app-shell" style="background: var(--bg-gradient);">
    <main class="auth-container animate-fade-in">
      <div class="glass-card auth-card">
        <div class="logo-icon" style="font-size: 3rem; margin-bottom: 0.5rem;">❤️</div>
        <h1 style="font-family: var(--font-accent);">MemoryBook</h1>
        <p style="color: var(--color-secondary-text); font-size: 0.9rem; margin-top: 0.5rem;">Private Couple Vault</p>

        <div class="auth-tabs">
          <div class="auth-tab active" onclick="window.AuthUI.switchTab('login')" id="tab-login">Sign In</div>
          <div class="auth-tab" onclick="window.AuthUI.switchTab('register')" id="tab-register">Sign Up</div>
        </div>

        <!-- Registration locked notice -->
        <div class="registration-locked-msg" id="registration-locked-msg">
          🔒 MemoryBook is a private invitation-only application.
        </div>

        <div class="auth-error" id="auth-error-msg"></div>

        <form id="auth-form" class="auth-form">
          <div class="form-group" id="group-username" style="display: none;">
            <label for="auth-username">Username</label>
            <input type="text" id="auth-username" class="form-input" placeholder="e.g. Jaylan or Omia" autocomplete="username">
          </div>
          <div class="form-group">
            <label for="auth-email" id="label-email">Email or Username</label>
            <input type="text" id="auth-email" class="form-input" required placeholder="Enter email or username" autocomplete="email">
          </div>
          <div class="form-group">
            <label for="auth-password">Password</label>
            <input type="password" id="auth-password" class="form-input" required placeholder="Enter password" autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.25rem;" id="btn-auth-submit">Sign In</button>
        </form>

        <div class="divider" style="margin-top: 1.25rem;">or</div>
        <button class="btn-guest" id="btn-guest-access" onclick="window.AuthUI.continueAsGuest()">
          👀 Continue as Guest (Read-Only)
        </button>

      </div>
    </main>
  </div>

  <script type="module" src="../js/auth.js?v=4"></script>

  <script type="module" src="../js/app.js"></script>
</body>
</html>
