<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MemoryBook — Booting Vault</title>
  <!-- SEO Meta Tags -->
  <meta name="description" content="A premium relationship vault for Jaylan and Omia, capturing timelines, anniversaries, and shared memories.">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .boot-loader-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: var(--bg-gradient);
    }
    .boot-card {
      text-align: center;
      padding: 3rem;
      max-width: 400px;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid var(--border-glass);
      border-radius: 50%;
      border-top-color: var(--color-jaylan);
      animation: spin 1s ease-in-out infinite;
      margin: 1.5rem auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .boot-text {
      font-size: 0.95rem;
      color: var(--color-secondary-text);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="boot-loader-container">
    <div class="boot-card glass-card">
      <div class="logo-icon">❤️</div>
      <h1 class="logo-text" style="margin: 0.5rem 0 1rem 0;">MemoryBook</h1>
      <div class="spinner"></div>
      <div class="boot-text" id="boot-status">Initializing Vault...</div>
    </div>
  </div>

  <script type="module">
    // DUMB BOOTLOADER - Immediate redirect only
    window.location.replace("pages/login.html");
  </script>
</body>
</html>
