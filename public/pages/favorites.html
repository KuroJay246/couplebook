<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favorites — MemoryBook</title>
  <meta name="description" content="A side-by-side comparison of Jaylan and Omia's favorite things.">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pages.css">
  <style>
    .favorites-layout {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2rem;
      margin-top: 1rem;
    }
    .favorites-card {
      padding: 1.5rem;
    }
    .favorites-section {
      margin-bottom: 1.5rem;
      background: rgba(0,0,0,0.15);
      border-radius: 12px;
      padding: 1rem;
      border: 1px solid var(--border-glass);
    }
    .favorites-section-title {
      font-family: var(--font-accent);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--color-primary-text);
      margin-bottom: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .favorites-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .favorites-list li {
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      display: flex;
      justify-content: space-between;
      color: var(--color-secondary-text);
    }
    .favorites-list li:last-child {
      border-bottom: none;
    }
    .btn-icon {
      background: none;
      border: none;
      color: var(--color-muted);
      cursor: pointer;
      font-size: 1rem;
      transition: var(--transition-fast);
    }
    .btn-icon:hover {
      color: #ef4444;
    }
    .add-btn {
      color: var(--color-shared);
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: 600;
      background: none;
      border: none;
    }
    .add-btn:hover {
      text-decoration: underline;
    }
    @media (max-width: 900px) {
      .favorites-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="app-shell">
    <div id="navigation-shell"></div>

    <main class="main-content">
      <div style="text-align: center; margin-bottom: 2rem;">
        <h1 style="font-family: var(--font-accent); font-weight: 700;">🌟 Favorite Things</h1>
        <p style="color: var(--color-secondary-text); font-size: 0.9rem;">A side-by-side look at what makes Jaylan and Omia smile.</p>
      </div>

      <div class="favorites-layout">
        
        <!-- Jaylan Favorites Card -->
        <div class="glass-card favorites-card">
          <h2 style="font-family: var(--font-accent); text-align: center; color: var(--color-jaylan); margin-bottom: 1.5rem;">Jaylan's Favorites</h2>
          
          <div class="favorites-section">
            <div class="favorites-section-title">
              🍕 Food
              <button class="add-btn" onclick="addFavorite('jaylan', 'food')">+ Add</button>
            </div>
            <ul class="favorites-list" id="j-food-list"></ul>
          </div>

          <div class="favorites-section">
            <div class="favorites-section-title">
              🏖️ Places
              <button class="add-btn" onclick="addFavorite('jaylan', 'places')">+ Add</button>
            </div>
            <ul class="favorites-list" id="j-places-list"></ul>
          </div>

          <div class="favorites-section">
            <div class="favorites-section-title">
              🎨 Hobbies
              <button class="add-btn" onclick="addFavorite('jaylan', 'hobbies')">+ Add</button>
            </div>
            <ul class="favorites-list" id="j-hobbies-list"></ul>
          </div>

          <div class="favorites-section">
            <div class="favorites-section-title">
              🏃 Activities
              <button class="add-btn" onclick="addFavorite('jaylan', 'activities')">+ Add</button>
            </div>
            <ul class="favorites-list" id="j-activities-list"></ul>
          </div>
        </div>

        <!-- Omia Favorites Card -->
        <div class="glass-card favorites-card">
          <h2 style="font-family: var(--font-accent); text-align: center; color: var(--color-omia); margin-bottom: 1.5rem;">Omia's Favorites</h2>
          
          <div class="favorites-section">
            <div class="favorites-section-title">
              🍕 Food
              <button class="add-btn" onclick="addFavorite('omia', 'food')">+ Add</button>
            </div>
            <ul class="favorites-list" id="o-food-list"></ul>
          </div>

          <div class="favorites-section">
            <div class="favorites-section-title">
              🏖️ Places
              <button class="add-btn" onclick="addFavorite('omia', 'places')">+ Add</button>
            </div>
            <ul class="favorites-list" id="o-places-list"></ul>
          </div>

          <div class="favorites-section">
            <div class="favorites-section-title">
              🎨 Hobbies
              <button class="add-btn" onclick="addFavorite('omia', 'hobbies')">+ Add</button>
            </div>
            <ul class="favorites-list" id="o-hobbies-list"></ul>
          </div>

          <div class="favorites-section">
            <div class="favorites-section-title">
              🏃 Activities
              <button class="add-btn" onclick="addFavorite('omia', 'activities')">+ Add</button>
            </div>
            <ul class="favorites-list" id="o-activities-list"></ul>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script type="module" src="../js/app.js"></script>
  <script type="module" src="../js/favorites.js"></script>
</body>
</html>
