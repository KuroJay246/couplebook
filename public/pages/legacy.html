<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legacy Module — MemoryBook</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pages.css">
  <style>
    .iframe-container {
      width: 100%;
      height: calc(100vh - 180px);
      border: 1px solid var(--border-glass);
      border-radius: 12px;
      overflow: hidden;
      background: var(--bg-main);
      box-shadow: var(--shadow-glass);
      margin-top: 1rem;
    }
    .legacy-module-frame {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div id="app-shell">
    <div id="navigation-shell"></div>
    <main class="main-content">
      <div style="text-align: center; margin-bottom: 1rem;">
        <h1 style="font-family: var(--font-accent); font-weight: 700;" id="legacy-title">✨ Special Module</h1>
      </div>
      <div class="iframe-container">
        <iframe class="legacy-module-frame" id="legacy-frame"></iframe>
      </div>
    </main>
  </div>
  <script type="module" src="../js/app.js"></script>
  <script type="module" src="../js/legacy.js"></script>
</body>
</html>
