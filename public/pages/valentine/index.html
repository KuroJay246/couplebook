<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Private Moment — MemoryBook</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: Georgia, serif;
    color: #fff4f8;
    background:
      radial-gradient(circle at 20% 10%, rgba(255, 199, 215, 0.2), transparent 30%),
      linear-gradient(160deg, #511227 0%, #9f1f4f 55%, #1f0710 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: min(100%, 560px);
    padding: 32px 28px;
    border-radius: 28px;
    background: rgba(33, 10, 17, 0.78);
    border: 1px solid rgba(255, 226, 235, 0.18);
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
    text-align: center;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 64px;
    height: 64px;
    margin-bottom: 18px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.08);
    font-size: 1.9rem;
  }
  h1 {
    margin: 0 0 12px;
    font-size: clamp(1.9rem, 4vw, 2.5rem);
  }
  p {
    margin: 0;
    color: rgba(255, 244, 248, 0.82);
    line-height: 1.7;
    font-size: 0.98rem;
  }
  .actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 24px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 180px;
    padding: 12px 18px;
    border-radius: 999px;
    text-decoration: none;
    font-weight: 600;
  }
  .btn-primary {
    color: #511227;
    background: #ffd9e5;
  }
  .btn-secondary {
    color: #fff4f8;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.12);
  }
</style>
</head>
<body>
  <main class="card" aria-live="polite">
    <div class="badge">🔒</div>
    <h1 id="moment-title">Securing Private Moment</h1>
    <p id="moment-message">Checking your approved MemoryBook session before this private moment can continue.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/pages/login.html" id="primary-action">Open Sign-In</a>
      <a class="btn btn-secondary" href="/pages/dashboard.html" id="secondary-action">Return to Dashboard</a>
    </div>
  </main>

  <script type="module">
    import { waitForApprovedUserState } from '/services/pageAccessService.js';

    const title = document.getElementById('moment-title');
    const message = document.getElementById('moment-message');
    const primary = document.getElementById('primary-action');
    const secondary = document.getElementById('secondary-action');

    const showBlockedState = (text) => {
      title.textContent = 'Private Moment Locked';
      message.textContent = text;
      primary.textContent = 'Open Sign-In';
      primary.href = '/pages/login.html';
      secondary.textContent = 'Back to Vault Login';
      secondary.href = '/pages/login.html';
    };

    const showAuthorizedState = () => {
      title.textContent = 'Private Moment Temporarily Unavailable';
      message.textContent =
        'This sensitive page was removed from the public static surface during privacy hardening and will return through the protected app migration.';
      primary.textContent = 'Return to Dashboard';
      primary.href = '/pages/dashboard.html';
      secondary.textContent = 'Back to Private Shell';
      secondary.href = '/pages/legacy.html?module=valentine/index.html';
    };

    const result = await waitForApprovedUserState({ timeoutMs: 5000 });
    if (result.status === 'authorized') {
      showAuthorizedState();
    } else if (result.status === 'unauthorized') {
      showBlockedState('This account is not approved for Couple Book private moments.');
    } else if (result.status === 'unavailable') {
      showBlockedState('Couple Book could not verify your approved session. Please sign in again.');
    } else {
      showBlockedState('This private moment is available only inside the approved Couple Book experience.');
    }
  </script>
</body>
</html>
